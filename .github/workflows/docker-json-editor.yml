name: Build & Push JSON Editor

on:
  push:
    branches: [main, master, dev]
    tags: ['v*']
    paths:
      - 'apps/json-editor-tool/**'
      - '.github/workflows/docker-json-editor.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'apps/json-editor-tool/**'
      - '.github/workflows/docker-json-editor.yml'

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: kdqg
  REPOSITORY: opc-json-editor
  CONTEXT: apps/json-editor-tool

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata (dev branch)
        id: meta-dev
        if: github.ref == 'refs/heads/dev'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}
          tags: |
            type=sha,prefix=dev-,suffix=,format=short
            type=raw,value=dev-latest

      - name: Extract metadata (main/master/tags)
        id: meta-main
        if: github.ref != 'refs/heads/dev'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-dev.outputs.tags || steps.meta-main.outputs.tags }}
          labels: ${{ steps.meta-dev.outputs.labels || steps.meta-main.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
