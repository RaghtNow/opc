name: Deploy JSON Parser

on:
  workflow_run:
    workflows: ["Build & Push JSON Parser"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: crpi-7lyodabocu0g6i1q.cn-beijing.personal.cr.aliyuncs.com
  NAMESPACE: kdqg
  REPOSITORY: opc-json-parser

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/opc
            
            # 更新 docker-compose.yml
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              json-parser:
                image: crpi-7lyodabocu0g6i1q.cn-beijing.personal.cr.aliyuncs.com/kdqg/opc-json-parser:latest
                container_name: opc-json-parser
                ports:
                  - "8081:80"
                restart: unless-stopped
                labels:
                  - "com.opc.service=json-parser"
                networks:
                  - opc-network
            
            networks:
              opc-network:
                external: true
            EOF
            
            docker network create opc-network 2>/dev/null || echo "网络已存在"
            docker compose pull json-parser
            docker compose up -d json-parser
            docker image prune -f

      - name: Notify deployment
        run: |
          echo "✅ Deployed to server successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.REPOSITORY }}:latest"
