version: '3.8'

services:
  json-parser:
    image: crpi-7lyodabocu0g6i1q.cn-beijing.personal.cr.aliyuncs.com/kdqg/opc-json-parser:latest
    container_name: opc-json-parser
    ports:
      - "8081:80"
    restart: unless-stopped
    labels:
      - "com.opc.service=json-parser"
    networks:
      - opc-network

  nginx:
    image: nginx:alpine
    container_name: opc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - json-parser
    restart: unless-stopped
    networks:
      - opc-network

networks:
  opc-network:
    external: true

volumes:
  ssl-certs:
